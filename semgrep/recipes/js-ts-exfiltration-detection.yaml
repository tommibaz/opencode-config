      confidence: MEDIUM

  # --- Clipboard read + network send ---
  - id: js-ts-clipboard-exfil
    patterns:
      - pattern-either:
          - pattern: navigator.clipboard.readText()
          - pattern: $CLIPBOARD.readText(...)
      - pattern-inside: |
          ...
          fetch($URL, ...)
    message: >
      Clipboard read followed by network request — possible clipboard exfiltration.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: MEDIUM

  # --- File system enumeration + exfiltration ---
  - id: js-ts-fs-enumeration-exfil
    patterns:
      - pattern-either:
          - pattern: '$FS.readdirSync($DIR, { recursive: true })'
          - pattern: '$FS.readdir($DIR, { recursive: true }, ...)'
      - pattern-inside: |
          ...
          fetch($URL, ...)
    message: >
      Recursive directory listing followed by network request — possible file enumeration and exfiltration.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: MEDIUM

