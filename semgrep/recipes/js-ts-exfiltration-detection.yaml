  # --- Exfiltration via DNS TXT records ---
  - id: js-ts-dns-txt-exfiltration
    pattern-either:
      - pattern: require('dns').resolveTxt($DOMAIN, ...)
      - pattern: require('dns').resolve($DOMAIN, 'TXT', ...)
      - patterns:
          - pattern: import $DNS from 'dns'
          - pattern-inside: |
              ...
              $DNS.resolveTxt($DOMAIN, ...)
      - patterns:
          - pattern: import $DNS from 'dns'
          - pattern-inside: |
              ...
              $DNS.resolve($DOMAIN, 'TXT', ...)
    message: >
      DNS TXT record resolution — possible DNS-based data exfiltration or C2 channel.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: MEDIUM

  # --- Clipboard read + network send ---
  - id: js-ts-clipboard-exfil
    patterns:
      - pattern-either:
          - pattern: navigator.clipboard.readText()
          - pattern: $CLIPBOARD.readText(...)
      - pattern-inside: |
          ...
          fetch($URL, ...)
    message: >
      Clipboard read followed by network request — possible clipboard exfiltration.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: MEDIUM

  # --- File system enumeration + exfiltration ---
  - id: js-ts-fs-enumeration-exfil
    patterns:
      - pattern-either:
          - pattern: '$FS.readdirSync($DIR, { recursive: true })'
          - pattern: '$FS.readdir($DIR, { recursive: true }, ...)'
      - pattern-inside: |
          ...
          fetch($URL, ...)
    message: >
      Recursive directory listing followed by network request — possible file enumeration and exfiltration.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: MEDIUM

