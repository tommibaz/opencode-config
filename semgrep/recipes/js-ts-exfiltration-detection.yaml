rules:
  # ============================================================
  # JS/TS EXFILTRATION CHANNEL DETECTION
  # Detects library imports and code patterns used to exfiltrate
  # data through various communication channels.
  # ============================================================

  # --- Discord webhook exfiltration ---
  - id: js-ts-discord-webhook-exfil
    pattern-either:
      - patterns:
          - pattern: fetch($WEBHOOK, ...)
          - metavariable-regex:
              metavariable: $WEBHOOK
              regex: '.*discord(app)?\.com/api/webhooks/.*'
      - patterns:
          - pattern: axios.post($WEBHOOK, ...)
          - metavariable-regex:
              metavariable: $WEBHOOK
              regex: '.*discord(app)?\.com/api/webhooks/.*'
    message: >
      POST request to Discord webhook URL — possible data exfiltration channel.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: HIGH

  # --- Telegram Bot API exfiltration ---
  - id: js-ts-telegram-exfil
    pattern-either:
      - pattern: 'fetch("https://api.telegram.org/bot" + $TOKEN + "/sendMessage", ...)'
      - pattern: 'axios.post("https://api.telegram.org/bot" + $TOKEN + "/sendMessage", ...)'
    message: >
      Telegram Bot API sendMessage call — possible data exfiltration channel.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: HIGH

