rules:
  # ============================================================
  # PHP SUPPLY CHAIN & BACKDOOR DETECTION
  # Detect backdoor patterns in PHP dependencies
  #
  # Network inventory rules are in php-outbound-network-inventory.yaml
  #
  # Usage:
  #   semgrep --config php-backdoor-detection.yaml \
  #     --no-git-ignore --exclude='!vendor' vendor/
  # ============================================================

  # --- Dynamic code execution ---
  - id: php-suspicious-eval
    pattern: eval(...)
    message: >
      eval() call - dynamic code execution.
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious

  - id: php-suspicious-create-function
    pattern: create_function(...)
    message: >
      create_function() - deprecated, evaluates code string.
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious

  # --- Shell execution ---
  - id: php-suspicious-exec
    pattern: exec(...)
    message: >
      exec() - shell command execution.
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious

  - id: php-suspicious-system
    pattern: system(...)
    message: >
      system() - shell command execution with output.
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious

  - id: php-suspicious-shell-exec
    pattern: shell_exec(...)
    message: >
      shell_exec() - shell command execution.
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious

  - id: php-suspicious-passthru
    pattern: passthru(...)
    message: >
      passthru() - shell command execution with raw output.
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious

  - id: php-suspicious-proc-open
    pattern: proc_open(...)
    message: >
      proc_open() - process execution with I/O control.
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious

  - id: php-suspicious-popen
    pattern: popen(...)
    message: >
      popen() - process pipe execution.
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious

  # --- Backdoor: base64 decode + eval ---
  - id: php-backdoor-eval-base64
    pattern: eval(base64_decode(...))
    message: >
      eval(base64_decode()) - classic PHP backdoor pattern.
    severity: ERROR
    languages: [php]
    metadata:
      category: backdoor
      confidence: HIGH

  # --- Backdoor: env exfiltration ---
  - id: php-backdoor-env-exfil-getenv
    patterns:
      - pattern: |
          $DATA = getenv(...);
          ...
          curl_exec(...);
    message: >
      Environment variable read followed by cURL exec - possible exfiltration.
    severity: ERROR
    languages: [php]
    metadata:
      category: backdoor
      confidence: MEDIUM

  # --- Backdoor: writing PHP files (webshell) ---
  - id: php-backdoor-file-put-contents-php
    patterns:
      - pattern: file_put_contents($PATH, ...)
      - metavariable-regex:
          metavariable: $PATH
          regex: .*\.php.*
    message: >
      Writing .php file - possible webshell deployment.
    severity: ERROR
    languages: [php]
    metadata:
      category: backdoor
      confidence: HIGH

  # --- Backdoor: obfuscated function calls ---
  - id: php-backdoor-variable-function
    patterns:
      - pattern: $FUNC(...)
      - metavariable-regex:
          metavariable: $FUNC
          regex: ^\$
      - pattern-not: $OBJ->$METHOD(...)
      - pattern-not: $CLASS::$METHOD(...)
    message: >
      Variable function call - a PHP variable is used as a function name,
      which may hide malicious function invocation (e.g. $fn = "system"; $fn("cmd")).
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious

  - id: php-backdoor-call-user-func
    pattern-either:
      - pattern: call_user_func($FUNC, ...)
      - pattern: call_user_func_array($FUNC, ...)
    message: >
      call_user_func/call_user_func_array - dynamic function dispatch
      that can hide malicious invocations.
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious

  # --- Backdoor: include/require remote ---
  - id: php-backdoor-include-variable
    pattern: include($VAR)
    message: >
      Dynamic include - may load remote or attacker-controlled code.
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious

  - id: php-backdoor-require-variable
    pattern: require($VAR)
    message: >
      Dynamic require - may load remote or attacker-controlled code.
    severity: WARNING
    languages: [php]
    metadata:
      category: suspicious
