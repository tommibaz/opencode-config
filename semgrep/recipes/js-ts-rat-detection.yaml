rules:
  # ============================================================
  # JS/TS RAT (Remote Access Trojan) DETECTION
  # Detects library imports and code patterns associated with
  # remote access trojans and surveillance software.
  # ============================================================

  # --- Keylogger library import ---
  - id: js-ts-keylogger-pattern
    pattern-either:
      - pattern: require('iohook')
      - pattern: require('keylogger')
      - pattern: require('node-key-sender')
    message: >
      Keylogger library import — possible credential capture.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: HIGH

  # --- Screenshot capture library import ---
  - id: js-ts-screenshot-capture
    pattern-either:
      - pattern: require('screenshot-desktop')
      - pattern: require('desktop-screenshot')
      - pattern: require('node-screenshots')
    message: >
      Screenshot capture library import — possible surveillance behavior.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: MEDIUM

  # --- Microphone/camera capture library import ---
  - id: js-ts-media-capture
    pattern-either:
      - pattern: require('node-record-lpcm16')
      - pattern: require('mic')
      - pattern: require('node-webcam')
      - pattern: require('webcam')
    message: >
      Microphone or camera capture library import — possible surveillance behavior.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: MEDIUM

  # --- Reverse shell via net.Socket ---
  - id: js-ts-reverse-shell-socket
    pattern: |
      require('net').Socket().pipe(require('child_process').spawn('/bin/sh', ['-i'], ...))
    message: >
      Reverse shell via net.Socket piped to shell — RAT behavior.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: HIGH

  # --- Cryptocurrency mining library import ---
  - id: js-ts-crypto-mining
    pattern-either:
      - pattern: require('coin-hive')
      - pattern: require('cryptocurrency-miner')
      - pattern: require('webminer')
      - pattern: require('node-cryptonight')
    message: >
      Cryptocurrency mining library import — possible unauthorized mining.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: HIGH

  # --- Steganography library import ---
  - id: js-ts-steganography-exfil
    pattern-either:
      - pattern: require('steganography')
      - pattern: require('stegcloak')
      - pattern: require('png-steg')
    message: >
      Steganography library import — possible data hiding in images.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: backdoor
      confidence: MEDIUM
