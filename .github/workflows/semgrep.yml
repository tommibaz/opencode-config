name: Semgrep
on:
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/semgrep.yml
  schedule:
    # random HH:MM to avoid a load spike on GitHub Actions at 00:00
    - cron: '08 30 * * *'
jobs:
  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    container:
      image: semgrep/semgrep
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v6
      - run: semgrep ci
      - name: Run custom JS/TS recipes
        run: |
          semgrep --config semgrep/recipes/outbound-network-inventory.yaml \
                  --config semgrep/recipes/npm-backdoor-detection.yaml \
                  --config semgrep/recipes/js-ts-obfuscation-detection.yaml \
                  --config semgrep/recipes/js-ts-rat-detection.yaml \
                  --config semgrep/recipes/js-ts-persistence-detection.yaml \
                  --config semgrep/recipes/js-ts-exfiltration-detection.yaml \
                  --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' \
                  --error
