name: Semgrep

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: {}
  schedule:
    - cron: '30 08 * * *'

jobs:
  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    permissions:
      contents: read
    if: (github.actor != 'dependabot[bot]')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep CI
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: semgrep ci

      - name: Run custom JS/TS recipes
        run: |
          semgrep scan \
            --config semgrep/recipes/outbound-network-inventory.yaml \
            --config semgrep/recipes/npm-backdoor-detection.yaml \
            --config semgrep/recipes/js-ts-obfuscation-detection.yaml \
            --config semgrep/recipes/js-ts-rat-detection.yaml \
            --config semgrep/recipes/js-ts-persistence-detection.yaml \
            --config semgrep/recipes/js-ts-exfiltration-detection.yaml \
            --include="*.ts" --include="*.js" --include="*.tsx" --include="*.jsx" \
            --exclude="tests/" \
            --error
